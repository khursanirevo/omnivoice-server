services:
  omnivoice-server:
    build: .
    ports:
      - "8880:8880"
    volumes:
      # Persist voice profiles
      - ./profiles:/app/profiles
    environment:
      # Server configuration
      - OMNIVOICE_HOST=0.0.0.0
      - OMNIVOICE_PORT=8880
      - OMNIVOICE_DEVICE=cuda
      - OMNIVOICE_WORKERS=${OMNIVOICE_WORKERS:-1}
      - OMNIVOICE_NUM_STEP=32
      - OMNIVOICE_MAX_CONCURRENT=2

      # Model — point to your custom checkpoint repo on HuggingFace
      - OMNIVOICE_MODEL_ID=${OMNIVOICE_MODEL_ID:-k2-fsa/OmniVoice}

      # GPU visibility
      - NVIDIA_VISIBLE_DEVICES=0

      # Optional: Enable authentication
      # - OMNIVOICE_API_KEY=your-secret-key

      # Optional: Adjust inference quality
      # - OMNIVOICE_GUIDANCE_SCALE=2.0
      # - OMNIVOICE_DENOISE=true

      # Optional: Logging
      # - OMNIVOICE_LOG_LEVEL=info
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
